name: Docker

# Builds a multi-arch (amd64 + arm64) image from source and pushes it to GHCR.
# Runs on every release tag. Can also be run manually from the default branch to
# publish an image for the current source (e.g. the current release).
#
# It always builds the ref it runs from - the pushed tag, or the branch selected
# for a manual run - so the Dockerfile and the source it builds stay in sync.
# (Never check out an older tag here: old tags carry the old build tooling.)
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version tag (blank = read from Cargo.toml)'
        required: false
        default: ''
      latest:
        description: 'Also tag the image as :latest'
        type: boolean
        default: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # lets GITHUB_TOKEN push to GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            V="${{ inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            V="${GITHUB_REF_NAME}"
          else
            V="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          fi
          V="${V#v}"          # strip a leading v if present
          MM="${V%.*}"        # major.minor
          echo "full=$V" >> "$GITHUB_OUTPUT"
          echo "minor=$MM" >> "$GITHUB_OUTPUT"
          echo "Building image version $V"

      # QEMU is a fallback only; the compile is native cross and the runtime
      # stage only COPYs files, so no foreign code is executed.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ steps.ver.outputs.full }}
            type=raw,value=${{ steps.ver.outputs.minor }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' || inputs.latest }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: contrib/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
