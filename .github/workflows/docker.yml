name: Docker

# Builds a multi-arch (amd64 + arm64) image from source and pushes it to GHCR.
# Runs on every release tag, and can be triggered manually to (re)build an
# existing tag - handy for publishing an image for an already-released version.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag to build, e.g. v0.9.0 (blank = current branch/tag)'
        required: false
        default: ''
      latest:
        description: 'Also tag the image as :latest'
        type: boolean
        default: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

concurrency:
  group: docker-${{ github.ref }}-${{ inputs.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # lets GITHUB_TOKEN push to GHCR
    steps:
      - name: Resolve ref to build
        id: ref
        run: |
          if [ -n "${{ inputs.ref }}" ]; then
            echo "value=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout ${{ steps.ref.outputs.value }}
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.value }}

      - name: Derive version tags
        id: ver
        run: |
          REF="${{ steps.ref.outputs.value }}"
          V="${REF#v}"        # 0.9.0
          MM="${V%.*}"        # 0.9
          {
            echo "full=$V"
            echo "minor=$MM"
          } >> "$GITHUB_OUTPUT"

      # QEMU is registered as a fallback; the actual compile is native cross,
      # and the runtime stage only COPYs files, so no foreign code is executed.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ steps.ver.outputs.full }}
            type=raw,value=${{ steps.ver.outputs.minor }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' || inputs.latest }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: contrib/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
